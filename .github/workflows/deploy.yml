# ============ .github/workflows/deploy.yml ============

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Build with environment variables
        run: |
          # Créer un fichier config.js avec les variables d'environnement
          echo "// Auto-generated config" > config.js
          echo "const firebaseConfig = {" >> config.js
          echo "    apiKey: '${{ secrets.FIREBASE_API_KEY }}'," >> config.js
          echo "    authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}'," >> config.js
          echo "    databaseURL: '${{ secrets.FIREBASE_DATABASE_URL }}'," >> config.js
          echo "    projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'," >> config.js
          echo "    storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}'," >> config.js
          echo "    messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}'," >> config.js
          echo "    appId: '${{ secrets.FIREBASE_APP_ID }}'" >> config.js
          echo "};" >> config.js
          echo "firebase.initializeApp(firebaseConfig);" >> config.js
          echo "const database = firebase.database();" >> config.js
          echo "const productsRef = database.ref('products');" >> config.js
          echo "const ordersRef = database.ref('orders');" >> config.js
          echo "const cartsRef = database.ref('carts');" >> config.js
          echo "const tablesRef = database.ref('tables');" >> config.js
          echo "const categoriesRef = database.ref('categories');" >> config.js
          echo "const restaurantsRef = database.ref('restaurants');" >> config.js
          echo "console.log('✅ Firebase initialisé');" >> config.js
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
