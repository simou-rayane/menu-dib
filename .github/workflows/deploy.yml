name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Build with environment variables
        run: |
          # Créer le dossier de build
          mkdir -p ./build
          
          # Copier tous les fichiers HTML, CSS, JS
          cp -r *.html *.css *.js images ./build/ 2>/dev/null || true
          
          # Générer firebase-config.js avec les secrets GitHub
          echo "// Auto-generated config - DO NOT EDIT" > ./build/firebase-config.js
          echo "const firebaseConfig = {" >> ./build/firebase-config.js
          echo "    apiKey: '${{ secrets.FIREBASE_API_KEY }}'," >> ./build/firebase-config.js
          echo "    authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}'," >> ./build/firebase-config.js
          echo "    databaseURL: '${{ secrets.FIREBASE_DATABASE_URL }}'," >> ./build/firebase-config.js
          echo "    projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'," >> ./build/firebase-config.js
          echo "    storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}'," >> ./build/firebase-config.js
          echo "    messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}'," >> ./build/firebase-config.js
          echo "    appId: '${{ secrets.FIREBASE_APP_ID }}'" >> ./build/firebase-config.js
          echo "};" >> ./build/firebase-config.js
          echo "" >> ./build/firebase-config.js
          echo "// Initialiser Firebase" >> ./build/firebase-config.js
          echo "firebase.initializeApp(firebaseConfig);" >> ./build/firebase-config.js
          echo "const database = firebase.database();" >> ./build/firebase-config.js
          echo "" >> ./build/firebase-config.js
          echo "// Références" >> ./build/firebase-config.js
          echo "const productsRef = database.ref('products');" >> ./build/firebase-config.js
          echo "const ordersRef = database.ref('orders');" >> ./build/firebase-config.js
          echo "const cartsRef = database.ref('carts');" >> ./build/firebase-config.js
          echo "const tablesRef = database.ref('tables');" >> ./build/firebase-config.js
          echo "const categoriesRef = database.ref('categories');" >> ./build/firebase-config.js
          echo "const restaurantsRef = database.ref('restaurants');" >> ./build/firebase-config.js
          echo "" >> ./build/firebase-config.js
          echo "console.log('✅ Firebase initialisé');" >> ./build/firebase-config.js
          
          # Copier firebase-config.js à la racine du build
          cp ./build/firebase-config.js ./build/firebase-config.js
          
          echo "✅ Fichiers générés avec succès"
          ls -la ./build/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
