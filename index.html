<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant - Choisissez votre table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🍽️ Bienvenue au Restaurant</h1>
        <div class="table-selection">
            <h2>Sélectionnez votre table</h2>
            <div class="table-grid" id="tableGrid"></div>
        </div>
    </div>
    
    <script>
        // ============ AFFICHER LES TABLES ============
        function displayTables() {
            const grid = document.getElementById('tableGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const tableDiv = document.createElement('div');
                tableDiv.className = 'table-card';
                tableDiv.style.cssText = 'background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; font-size: 24px; font-weight: bold; transition: transform 0.3s;';
                tableDiv.innerHTML = `🪑 Table ${i}`;
                tableDiv.onmouseover = () => tableDiv.style.transform = 'scale(1.05)';
                tableDiv.onmouseout = () => tableDiv.style.transform = 'scale(1)';
                tableDiv.onclick = () => {
                    localStorage.setItem('current_table', i);
                    window.location.href = 'menu.html';
                };
                grid.appendChild(tableDiv);
            }
        }
        
        displayTables();
        console.log('🚀 Accueil chargé');
    </script>
</body>
</html>
