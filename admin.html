<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Firebase</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        /* Styles supplémentaires pour les images */
        .product-item .product-info-with-image {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        
        .product-item .product-thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #eee;
            background: #f8f9fa;
        }
        
        .product-item .product-thumbnail-placeholder {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 24px;
            border: 1px solid #eee;
        }
        
        .image-upload-area {
            margin: 10px 0;
        }
        
        .image-upload-area input[type="file"] {
            padding: 10px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            background: #fafafa;
            transition: all 0.3s;
        }
        
        .image-upload-area input[type="file"]:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        #imagePreview {
            display: none;
            margin: 10px 0;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            align-items: center;
            gap: 15px;
            border: 1px solid #667eea;
        }
        
        #imagePreview img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #667eea;
        }
        
        #imagePreview button {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .photo-indicator {
            color: #4caf50;
            font-size: 11px;
            margin-top: 3px;
        }
        
        .btn-photo {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin: 0 5px;
        }
        
        .btn-photo:hover {
            opacity: 0.8;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-overlay .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }
        
        .modal-overlay .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .modal-overlay .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-overlay .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .modal-overlay .modal-actions .btn-save {
            background: #667eea;
            color: white;
        }
        
        .modal-overlay .modal-actions .btn-cancel {
            background: #f44336;
            color: white;
        }
        
        .modal-overlay .current-photo {
            margin: 10px 0;
            padding: 10px;
            background: #f8f9ff;
            border-radius: 5px;
            text-align: center;
        }
        
        .modal-overlay .current-photo img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Administration Firebase</h1>
        
        <div id="connectionStatus" style="background: #f0f0f0; padding: 10px; border-radius: 5px; margin-bottom: 20px;">
            🔄 Connexion à Firebase...
        </div>
        
        <div class="admin-section">
            <h2>Ajouter un produit</h2>
            <form id="productForm">
                <input type="text" id="productName" placeholder="Nom du produit" required>
                <input type="number" id="productPrice" placeholder="Prix (€)" step="0.01" required>
                <select id="productCategory" required>
                    <option value="entrees">Entrées</option>
                    <option value="plats">Plats</option>
                    <option value="desserts">Desserts</option>
                    <option value="boissons">Boissons</option>
                </select>
                <textarea id="productDesc" placeholder="Description"></textarea>
                
                <!-- NOUVEAU: Upload d'image -->
                <div class="image-upload-area">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #555;">📷 Photo (optionnel)</label>
                    <input type="file" id="productImage" accept="image/*" onchange="previewImage(event)">
                </div>
                <div id="imagePreview">
                    <img id="previewImg" src="" alt="Aperçu">
                    <button type="button" onclick="removeImage()">🗑 Supprimer</button>
                </div>
                
                <button type="submit" class="btn-primary" id="addBtn">➕ Ajouter</button>
            </form>
        </div>

        <div class="admin-section">
            <h2>Gestion des produits (<span id="productCount">0</span>)</h2>
            <div id="productsList" class="products-list"></div>
        </div>
        
        <button onclick="resetFirebaseProducts()" style="background: #ff9800; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px;">
            🔄 Réinitialiser les produits
        </button>
    </div>
    
    <!-- Configuration Firebase -->
    <script src="firebase-config.js"></script>
    
    <!-- Script principal -->
    <script>
        // ============ ADMIN AVEC FIREBASE ET GESTION DES IMAGES ============
        
        let products = [];
        let isConnected = false;
        
        // ============ ÉTAT DE CONNEXION ============
        function updateConnectionStatus(connected) {
            const statusEl = document.getElementById('connectionStatus');
            if (connected) {
                statusEl.innerHTML = '✅ Connecté à Firebase';
                statusEl.style.background = '#d4edda';
                statusEl.style.color = '#155724';
                isConnected = true;
            } else {
                statusEl.innerHTML = '❌ Déconnecté de Firebase - Vérifiez votre configuration';
                statusEl.style.background = '#f8d7da';
                statusEl.style.color = '#721c24';
                isConnected = false;
            }
        }
        
        // Vérifier la connexion
        database.ref('.info/connected').on('value', (snapshot) => {
            updateConnectionStatus(snapshot.val());
        });
        
        // ============ ÉCOUTER LES PRODUITS EN TEMPS RÉEL ============
        function listenToProducts() {
            productsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                console.log('📦 Données reçues de Firebase:', data);
                
                if (data) {
                    products = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));
                    console.log('✅ Produits chargés:', products.length);
                } else {
                    products = [];
                    console.log('ℹ️ Aucun produit dans Firebase');
                    createDefaultProducts();
                }
                
                displayProducts();
                document.getElementById('productCount').textContent = products.length;
            }, (error) => {
                console.error('❌ Erreur Firebase:', error);
                alert('Erreur de connexion à Firebase: ' + error.message);
            });
        }
        
        // ============ CRÉER DES PRODUITS PAR DÉFAUT ============
        function createDefaultProducts() {
            console.log('🔄 Création des produits par défaut...');
            
            const defaultProducts = {
                'prod1': {
                    name: "Salade César",
                    price: 12,
                    category: "entrees",
                    description: "Salade, poulet, parmesan, sauce césar",
                    visible: true,
                    createdAt: Date.now()
                },
                'prod2': {
                    name: "Steak Frites",
                    price: 18,
                    category: "plats",
                    description: "Steak grillé 200g, frites maison",
                    visible: true,
                    createdAt: Date.now()
                },
                'prod3': {
                    name: "Tiramisu",
                    price: 7,
                    category: "desserts",
                    description: "Café, mascarpone, cacao",
                    visible: true,
                    createdAt: Date.now()
                },
                'prod4': {
                    name: "Coca-Cola",
                    price: 3,
                    category: "boissons",
                    description: "33cl",
                    visible: true,
                    createdAt: Date.now()
                }
            };
            
            productsRef.set(defaultProducts)
                .then(() => {
                    console.log('✅ Produits par défaut créés dans Firebase');
                })
                .catch(error => {
                    console.error('❌ Erreur création produits:', error);
                });
        }
        
        // ============ AFFICHER LES PRODUITS ============
        function displayProducts() {
            const container = document.getElementById('productsList');
            if (!container) return;
            
            if (products.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">Aucun produit. Ajoutez-en un !</p>';
                return;
            }
            
            container.innerHTML = '';
            products.forEach((product) => {
                const productDiv = document.createElement('div');
                productDiv.className = 'product-item';
                productDiv.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;';
                
                // Image ou placeholder
                let imageHtml = '';
                if (product.image) {
                    imageHtml = `<img src="${product.image}" class="product-thumbnail" alt="${product.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'product-thumbnail-placeholder\\'>📷</div>'">`;
                } else {
                    imageHtml = `<div class="product-thumbnail-placeholder">📷</div>`;
                }
                
                productDiv.innerHTML = `
                    <div class="product-info-with-image">
                        ${imageHtml}
                        <div style="flex: 1;">
                            <strong>${product.name}</strong> - ${product.price.toFixed(2)}€ 
                            <span style="color: #666;">(${product.category})</span>
                            <br><small>${product.description || 'Pas de description'}</small>
                            ${product.image ? '<div class="photo-indicator">📷 Photo présente</div>' : ''}
                        </div>
                    </div>
                    <div>
                        <span class="status ${product.visible ? 'visible' : 'hidden'}" 
                              onclick="toggleVisibility('${product.id}')" 
                              style="cursor: pointer; padding: 5px 10px; border-radius: 5px; 
                                     background: ${product.visible ? '#4caf50' : '#f44336'}; 
                                     color: white; margin: 0 5px;">
                            ${product.visible ? '✓ Visible' : '✗ Masqué'}
                        </span>
                        <button onclick="editProduct('${product.id}')" style="background: #2196F3; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin: 0 5px;">✏️</button>
                        <button onclick="changeImage('${product.id}')" class="btn-photo">📷</button>
                        <button onclick="deleteProduct('${product.id}')" style="background: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin: 0 5px;">🗑</button>
                    </div>
                `;
                container.appendChild(productDiv);
            });
        }
        
        // ============ VALIDATION ============
        function validateProduct(product) {
            const errors = [];
            
            if (!product.name || product.name.trim() === '') {
                errors.push('Le nom est requis');
            }
            
            if (!product.price || isNaN(product.price) || product.price <= 0) {
                errors.push('Le prix doit être un nombre positif');
            }
            
            const validCategories = ['entrees', 'plats', 'desserts', 'boissons'];
            if (!product.category || !validCategories.includes(product.category)) {
                errors.push('Catégorie invalide');
            }
            
            if (errors.length > 0) {
                alert('❌ ' + errors.join('\n'));
                return false;
            }
            return true;
        }
        
        // ============ UPLOAD D'IMAGE ============
        function uploadProductImage(file, productId) {
            return new Promise((resolve, reject) => {
                try {
                    // Vérifier que Firebase Storage est disponible
                    if (typeof firebase.storage === 'undefined') {
                        reject(new Error('Firebase Storage non disponible. Activez-le dans la console Firebase.'));
                        return;
                    }
                    
                    const storage = firebase.storage();
                    const storageRef = storage.ref();
                    const imageRef = storageRef.child(`products/${productId}/${file.name}`);
                    
                    // Upload de l'image
                    imageRef.put(file)
                        .then((snapshot) => {
                            return snapshot.ref.getDownloadURL();
                        })
                        .then((downloadURL) => {
                            // Sauvegarder l'URL dans la base de données
                            return productsRef.child(productId).update({
                                image: downloadURL,
                                updatedAt: Date.now()
                            });
                        })
                        .then(() => {
                            console.log('✅ Image uploadée avec succès');
                            resolve();
                        })
                        .catch((error) => {
                            console.error('❌ Erreur upload:', error);
                            reject(error);
                        });
                } catch (error) {
                    console.error('❌ Erreur:', error);
                    reject(error);
                }
            });
        }
        
        // ============ SUPPRIMER UNE IMAGE ============
        function deleteProductImage(productId) {
            return new Promise((resolve, reject) => {
                try {
                    const storage = firebase.storage();
                    
                    // Récupérer l'URL de l'image
                    productsRef.child(productId).once('value')
                        .then((snapshot) => {
                            const product = snapshot.val();
                            if (product && product.image) {
                                // Extraire le chemin de l'image depuis l'URL
                                const imagePath = decodeURIComponent(product.image.split('/o/')[1].split('?')[0]);
                                return storage.ref().child(imagePath).delete();
                            }
                            return Promise.resolve();
                        })
                        .then(() => {
                            // Supprimer l'URL de la base de données
                            return productsRef.child(productId).update({
                                image: null,
                                updatedAt: Date.now()
                            });
                        })
                        .then(() => {
                            console.log('✅ Image supprimée');
                            resolve();
                        })
                        .catch((error) => {
                            console.error('❌ Erreur suppression image:', error);
                            reject(error);
                        });
                } catch (error) {
                    console.error('❌ Erreur:', error);
                    reject(error);
                }
            });
        }
        
        // ============ CHANGER L'IMAGE D'UN PRODUIT ============
        function changeImage(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            // Créer un input file
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    
                    // Vérifier la taille du fichier (max 5MB)
                    if (file.size > 5 * 1024 * 1024) {
                        alert('❌ L\'image est trop volumineuse (max 5MB)');
                        return;
                    }
                    
                    if (confirm(`Changer la photo de "${product.name}" ?`)) {
                        uploadProductImage(file, productId)
                            .then(() => {
                                alert('✅ Photo mise à jour avec succès !');
                            })
                            .catch((error) => {
                                alert('❌ Erreur: ' + error.message);
                            });
                    }
                }
            };
            input.click();
        }
        
        // ============ PRÉVISUALISATION DE L'IMAGE ============
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    const img = document.getElementById('previewImg');
                    if (preview && img) {
                        img.src = e.target.result;
                        preview.style.display = 'flex';
                    }
                };
                reader.readAsDataURL(file);
            }
        }
        
        function removeImage() {
            const input = document.getElementById('productImage');
            const preview = document.getElementById('imagePreview');
            if (input) input.value = '';
            if (preview) preview.style.display = 'none';
        }
        
        // ============ AJOUTER UN PRODUIT ============
        function addProduct(productData) {
            if (!validateProduct(productData)) {
                return Promise.reject(new Error('Validation échouée'));
            }
            
            const newProduct = {
                name: productData.name.trim(),
                price: parseFloat(productData.price),
                category: productData.category,
                description: productData.description ? productData.description.trim() : '',
                visible: true,
                createdAt: Date.now()
            };
            
            // Ajouter à Firebase
            return productsRef.push().set(newProduct)
                .then((ref) => {
                    console.log('✅ Produit ajouté à Firebase avec ID:', ref.key);
                    
                    // Upload de l'image si présente
                    const fileInput = document.getElementById('productImage');
                    if (fileInput && fileInput.files.length > 0) {
                        return uploadProductImage(fileInput.files[0], ref.key)
                            .then(() => {
                                console.log('✅ Image uploadée');
                                alert('✅ Produit ajouté avec image !');
                            })
                            .catch((error) => {
                                console.warn('⚠️ Erreur upload image:', error);
                                alert('✅ Produit ajouté (mais image non uploadée)');
                            });
                    } else {
                        alert('✅ Produit ajouté avec succès !');
                        return Promise.resolve();
                    }
                })
                .catch((error) => {
                    console.error('❌ Erreur Firebase:', error);
                    alert('❌ Erreur: ' + error.message);
                    throw error;
                });
        }
        
        // ============ MODIFIER UN PRODUIT ============
        function editProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            // Créer un modal personnalisé pour l'édition
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal-content">
                    <h2>✏️ Modifier le produit</h2>
                    <form id="editForm">
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Nom *</label>
                            <input type="text" id="editName" value="${product.name}" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
                        </div>
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Prix (€) *</label>
                            <input type="number" id="editPrice" value="${product.price}" step="0.01" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
                        </div>
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Catégorie *</label>
                            <select id="editCategory" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                                <option value="entrees" ${product.category === 'entrees' ? 'selected' : ''}>Entrées</option>
                                <option value="plats" ${product.category === 'plats' ? 'selected' : ''}>Plats</option>
                                <option value="desserts" ${product.category === 'desserts' ? 'selected' : ''}>Desserts</option>
                                <option value="boissons" ${product.category === 'boissons' ? 'selected' : ''}>Boissons</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Description</label>
                            <textarea id="editDesc" rows="3" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">${product.description || ''}</textarea>
                        </div>
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">📷 Photo</label>
                            <div class="current-photo">
                                ${product.image ? `<img src="${product.image}" alt="Photo actuelle">` : '<span style="color: #999;">Aucune photo</span>'}
                            </div>
                            <input type="file" id="editImage" accept="image/*" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; margin-top: 5px;">
                            <div style="font-size: 12px; color: #666; margin-top: 5px;">
                                Laissez vide pour garder la photo actuelle.
                            </div>
                        </div>
                        <div class="modal-actions">
                            <button type="submit" class="btn-save">✅ Sauvegarder</button>
                            <button type="button" class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">❌ Annuler</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(overlay);
            
            document.getElementById('editForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const updates = {
                    name: document.getElementById('editName').value.trim(),
                    price: parseFloat(document.getElementById('editPrice').value),
                    category: document.getElementById('editCategory').value,
                    description: document.getElementById('editDesc').value.trim(),
                    updatedAt: Date.now()
                };
                
                if (!validateProduct(updates)) return;
                
                // Vérifier si une nouvelle image a été sélectionnée
                const fileInput = document.getElementById('editImage');
                const hasNewImage = fileInput && fileInput.files.length > 0;
                
                // Mettre à jour les données du produit
                productsRef.child(productId).update(updates)
                    .then(() => {
                        // Upload de la nouvelle image si présente
                        if (hasNewImage) {
                            return uploadProductImage(fileInput.files[0], productId);
                        }
                        return Promise.resolve();
                    })
                    .then(() => {
                        alert('✅ Produit modifié avec succès !');
                        overlay.remove();
                    })
                    .catch((error) => {
                        alert('❌ Erreur: ' + error.message);
                    });
            });
        }
        
        // ============ SUPPRIMER UN PRODUIT ============
        function deleteProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            if (confirm(`Supprimer "${product.name}" définitivement ?`)) {
                // Supprimer l'image si présente
                if (product.image) {
                    deleteProductImage(productId).catch(error => {
                        console.warn('⚠️ Erreur suppression image:', error);
                    });
                }
                
                productsRef.child(productId).remove()
                    .then(() => {
                        console.log('✅ Produit supprimé');
                        alert('✅ Produit supprimé !');
                    })
                    .catch(error => {
                        console.error('❌ Erreur:', error);
                        alert('❌ Erreur: ' + error.message);
                    });
            }
        }
        
        // ============ MASQUER/AFFICHER ============
        function toggleVisibility(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                productsRef.child(productId).update({
                    visible: !product.visible,
                    updatedAt: Date.now()
                })
                .then(() => {
                    console.log('✅ Visibilité modifiée');
                })
                .catch(error => {
                    console.error('❌ Erreur:', error);
                    alert('❌ Erreur: ' + error.message);
                });
            }
        }
        
        // ============ RÉINITIALISER ============
        function resetFirebaseProducts() {
            if (confirm('⚠️ Supprimer tous les produits et les réinitialiser ?')) {
                createDefaultProducts();
                alert('✅ Produits réinitialisés !');
            }
        }
        
        // ============ FORMULAIRE ============
        document.getElementById('productForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('📝 Formulaire soumis');
            
            const productData = {
                name: document.getElementById('productName').value,
                price: document.getElementById('productPrice').value,
                category: document.getElementById('productCategory').value,
                description: document.getElementById('productDesc').value
            };
            
            console.log('Données du formulaire:', productData);
            
            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Ajout en cours...';
            
            addProduct(productData)
                .then(() => {
                    this.reset();
                    removeImage();
                })
                .catch(() => {
                    // Erreur déjà gérée
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = '➕ Ajouter';
                });
        });
        
        // ============ INITIALISATION ============
        console.log('🚀 Démarrage de l\'administration Firebase...');
        listenToProducts();
        
        // Affichage des infos Firebase
        console.log('🔍 Firebase Database URL:', database.ref().toString());
        
        // Exposer les fonctions globalement
        window.changeImage = changeImage;
        window.toggleVisibility = toggleVisibility;
        window.editProduct = editProduct;
        window.deleteProduct = deleteProduct;
        window.previewImage = previewImage;
        window.removeImage = removeImage;
        window.resetFirebaseProducts = resetFirebaseProducts;
        
    </script>
</body>
</html>
