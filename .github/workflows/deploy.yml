name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Build with environment variables
        run: |
          # Créer le dossier de build
          mkdir -p ./build
          
          # Copier tous les fichiers HTML, CSS, JS et images
          cp -r *.html *.css *.js images ./build/ 2>/dev/null || true
          
          # Générer config.js avec les secrets GitHub
          cat > ./build/config.js << 'EOF'
          // Auto-generated config - DO NOT EDIT
          const firebaseConfig = {
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
              databaseURL: '${{ secrets.FIREBASE_DATABASE_URL }}',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ secrets.FIREBASE_APP_ID }}'
          };

          firebase.initializeApp(firebaseConfig);
          const database = firebase.database();

          const productsRef = database.ref('products');
          const ordersRef = database.ref('orders');
          const cartsRef = database.ref('carts');
          const tablesRef = database.ref('tables');
          const categoriesRef = database.ref('categories');
          const restaurantsRef = database.ref('restaurants');

          console.log('✅ Firebase initialisé');
          EOF
          
          # Copier aussi en firebase-config.js pour compatibilité
          cp ./build/config.js ./build/firebase-config.js
          
          echo "✅ Fichiers générés avec succès"
          ls -la ./build/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
