<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Firebase</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        .product-item .product-info-with-image {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        
        .product-item .product-thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #eee;
            background: #f8f9fa;
        }
        
        .product-item .product-thumbnail-placeholder {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 24px;
            border: 1px solid #eee;
        }
        
        .image-upload-area {
            margin: 10px 0;
        }
        
        .image-upload-area input[type="file"] {
            padding: 10px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            background: #fafafa;
            transition: all 0.3s;
        }
        
        .image-upload-area input[type="file"]:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        #imagePreview {
            display: none;
            margin: 10px 0;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            align-items: center;
            gap: 15px;
            border: 1px solid #667eea;
        }
        
        #imagePreview img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #667eea;
        }
        
        #imagePreview button {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .photo-indicator {
            color: #4caf50;
            font-size: 11px;
            margin-top: 3px;
        }
        
        .btn-photo {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin: 0 5px;
        }
        
        .btn-photo:hover {
            opacity: 0.8;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-overlay .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }
        
        .modal-overlay .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .modal-overlay .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-overlay .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .modal-overlay .modal-actions .btn-save {
            background: #667eea;
            color: white;
        }
        
        .modal-overlay .modal-actions .btn-cancel {
            background: #f44336;
            color: white;
        }
        
        .modal-overlay .current-photo {
            margin: 10px 0;
            padding: 10px;
            background: #f8f9ff;
            border-radius: 5px;
            text-align: center;
        }
        
        .modal-overlay .current-photo img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            animation: slideUp 0.5s ease;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .toast.success { background: #4caf50; }
        .toast.error { background: #f44336; }
        .toast.info { background: #2196F3; }
        .toast.warning { background: #ff9800; }
        
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Nouveau style pour l'upload d'images avec URL GitHub */
        .url-input-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        
        .url-input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .url-input-group button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .url-input-group button:hover {
            background: #764ba2;
        }
        
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .help-text a {
            color: #667eea;
            text-decoration: none;
        }
        
        .help-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Administration Firebase</h1>
        
        <div id="connectionStatus" style="background: #f0f0f0; padding: 10px; border-radius: 5px; margin-bottom: 20px;">
            🔄 Connexion à Firebase...
        </div>
        
        <div class="admin-section">
            <h2>Ajouter un produit</h2>
            <form id="productForm">
                <input type="text" id="productName" placeholder="Nom du produit" required>
                <input type="number" id="productPrice" placeholder="Prix (€)" step="0.01" required>
                <select id="productCategory" required>
                    <option value="entrees">Entrées</option>
                    <option value="plats">Plats</option>
                    <option value="desserts">Desserts</option>
                    <option value="boissons">Boissons</option>
                </select>
                <textarea id="productDesc" placeholder="Description"></textarea>
                
                <!-- Upload d'image -->
                <div class="image-upload-area">
                    <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #555;">📷 Photo (optionnel)</label>
                    
                    <!-- Option 1: Upload de fichier -->
                    <input type="file" id="productImage" accept="image/*" onchange="previewImage(event)">
                    
                    <!-- Option 2: URL GitHub -->
                    <div style="margin-top: 10px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 13px;">OU entrer l'URL GitHub de l'image :</label>
                        <div class="url-input-group">
                            <input type="text" id="productImageUrl" placeholder="https://raw.githubusercontent.com/votre-username/restaurant-menu/main/images/mon-image.jpg">
                            <button type="button" onclick="testImageUrl()">🔍 Tester</button>
                        </div>
                        <div class="help-text">
                            💡 Placez vos images dans le dossier <code>images/</code> de votre dépôt GitHub.
                            <br>Exemple: <code>https://raw.githubusercontent.com/votre-username/restaurant-menu/main/images/pizza.jpg</code>
                        </div>
                    </div>
                </div>
                
                <div id="imagePreview">
                    <img id="previewImg" src="" alt="Aperçu">
                    <button type="button" onclick="removeImage()">🗑 Supprimer</button>
                </div>
                <div id="urlPreview" style="display: none; margin: 10px 0; padding: 10px; background: #d4edda; border-radius: 8px; color: #155724;">
                    ✅ Image valide !
                </div>
                
                <button type="submit" class="btn-primary" id="addBtn">➕ Ajouter</button>
            </form>
        </div>

        <div class="admin-section">
            <h2>Gestion des produits (<span id="productCount">0</span>)</h2>
            <div id="productsList" class="products-list"></div>
        </div>
        
        <button onclick="resetFirebaseProducts()" style="background: #ff9800; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px;">
            🔄 Réinitialiser les produits
        </button>
    </div>
    
    <!-- Configuration Firebase -->
    <script src="firebase-config.js"></script>
    
    <!-- Script principal -->
    <script>
        // ============ ADMIN AVEC FIREBASE ET IMAGES GITHUB ============
        
        let products = [];
        let isConnected = false;
        let selectedImageUrl = null;
        
        // ============ ÉTAT DE CONNEXION ============
        function updateConnectionStatus(connected) {
            const statusEl = document.getElementById('connectionStatus');
            if (connected) {
                statusEl.innerHTML = '✅ Connecté à Firebase';
                statusEl.style.background = '#d4edda';
                statusEl.style.color = '#155724';
                isConnected = true;
            } else {
                statusEl.innerHTML = '❌ Déconnecté de Firebase - Vérifiez votre configuration';
                statusEl.style.background = '#f8d7da';
                statusEl.style.color = '#721c24';
                isConnected = false;
            }
        }
        
        database.ref('.info/connected').on('value', (snapshot) => {
            updateConnectionStatus(snapshot.val());
        });
        
        // ============ ÉCOUTER LES PRODUITS ============
        function listenToProducts() {
            productsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                console.log('📦 Données reçues de Firebase:', data);
                
                if (data) {
                    products = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));
                    console.log('✅ Produits chargés:', products.length);
                } else {
                    products = [];
                    console.log('ℹ️ Aucun produit dans Firebase');
                    createDefaultProducts();
                }
                
                displayProducts();
                document.getElementById('productCount').textContent = products.length;
            }, (error) => {
                console.error('❌ Erreur Firebase:', error);
                showToast('❌ Erreur de connexion: ' + error.message, 'error');
            });
        }
        
        // ============ CRÉER DES PRODUITS PAR DÉFAUT ============
        function createDefaultProducts() {
            console.log('🔄 Création des produits par défaut...');
            
            const defaultProducts = {
                'prod1': {
                    name: "Salade César",
                    price: 12,
                    category: "entrees",
                    description: "Salade, poulet, parmesan, sauce césar",
                    visible: true,
                    createdAt: Date.now()
                },
                'prod2': {
                    name: "Steak Frites",
                    price: 18,
                    category: "plats",
                    description: "Steak grillé 200g, frites maison",
                    visible: true,
                    createdAt: Date.now()
                },
                'prod3': {
                    name: "Tiramisu",
                    price: 7,
                    category: "desserts",
                    description: "Café, mascarpone, cacao",
                    visible: true,
                    createdAt: Date.now()
                },
                'prod4': {
                    name: "Coca-Cola",
                    price: 3,
                    category: "boissons",
                    description: "33cl",
                    visible: true,
                    createdAt: Date.now()
                }
            };
            
            productsRef.set(defaultProducts)
                .then(() => {
                    console.log('✅ Produits par défaut créés dans Firebase');
                })
                .catch(error => {
                    console.error('❌ Erreur création produits:', error);
                    showToast('❌ Erreur: ' + error.message, 'error');
                });
        }
        
        // ============ AFFICHER LES PRODUITS ============
        function displayProducts() {
            const container = document.getElementById('productsList');
            if (!container) return;
            
            if (products.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">Aucun produit. Ajoutez-en un !</p>';
                return;
            }
            
            container.innerHTML = '';
            products.forEach((product) => {
                const productDiv = document.createElement('div');
                productDiv.className = 'product-item';
                productDiv.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;';
                
                // Image ou placeholder
                let imageHtml = '';
                if (product.image) {
                    imageHtml = `<img src="${product.image}" class="product-thumbnail" alt="${product.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'product-thumbnail-placeholder\\'>📷</div>'">`;
                } else {
                    imageHtml = `<div class="product-thumbnail-placeholder">📷</div>`;
                }
                
                productDiv.innerHTML = `
                    <div class="product-info-with-image">
                        ${imageHtml}
                        <div style="flex: 1;">
                            <strong>${product.name}</strong> - ${product.price.toFixed(2)}€ 
                            <span style="color: #666;">(${product.category})</span>
                            <br><small>${product.description || 'Pas de description'}</small>
                            ${product.image ? '<div class="photo-indicator">📷 Photo présente</div>' : ''}
                        </div>
                    </div>
                    <div>
                        <span class="status ${product.visible ? 'visible' : 'hidden'}" 
                              onclick="toggleVisibility('${product.id}')" 
                              style="cursor: pointer; padding: 5px 10px; border-radius: 5px; 
                                     background: ${product.visible ? '#4caf50' : '#f44336'}; 
                                     color: white; margin: 0 5px;">
                            ${product.visible ? '✓ Visible' : '✗ Masqué'}
                        </span>
                        <button onclick="editProduct('${product.id}')" style="background: #2196F3; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin: 0 5px;">✏️</button>
                        <button onclick="changeImage('${product.id}')" class="btn-photo">📷</button>
                        <button onclick="deleteProduct('${product.id}')" style="background: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin: 0 5px;">🗑</button>
                    </div>
                `;
                container.appendChild(productDiv);
            });
        }
        
        // ============ VALIDATION ============
        function validateProduct(product) {
            const errors = [];
            
            if (!product.name || product.name.trim() === '') {
                errors.push('Le nom est requis');
            }
            
            if (!product.price || isNaN(product.price) || product.price <= 0) {
                errors.push('Le prix doit être un nombre positif');
            }
            
            const validCategories = ['entrees', 'plats', 'desserts', 'boissons'];
            if (!product.category || !validCategories.includes(product.category)) {
                errors.push('Catégorie invalide');
            }
            
            if (errors.length > 0) {
                showToast('❌ ' + errors.join('\n'), 'error');
                return false;
            }
            return true;
        }
        
        // ============ TESTER L'URL DE L'IMAGE ============
        function testImageUrl() {
            const url = document.getElementById('productImageUrl').value.trim();
            if (!url) {
                showToast('⚠️ Veuillez entrer une URL', 'warning');
                return;
            }
            
            const img = new Image();
            img.onload = function() {
                document.getElementById('urlPreview').style.display = 'block';
                document.getElementById('urlPreview').innerHTML = '✅ Image valide !';
                selectedImageUrl = url;
                showToast('✅ Image trouvée !', 'success');
            };
            img.onerror = function() {
                document.getElementById('urlPreview').style.display = 'block';
                document.getElementById('urlPreview').style.background = '#f8d7da';
                document.getElementById('urlPreview').style.color = '#721c24';
                document.getElementById('urlPreview').innerHTML = '❌ Image non trouvée. Vérifiez l\'URL.';
                selectedImageUrl = null;
                showToast('❌ Image non trouvée', 'error');
            };
            img.src = url;
        }
        
        // ============ PRÉVISUALISATION DE L'IMAGE ============
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    const img = document.getElementById('previewImg');
                    if (preview && img) {
                        img.src = e.target.result;
                        preview.style.display = 'flex';
                        selectedImageUrl = null;
                        document.getElementById('productImageUrl').value = '';
                        document.getElementById('urlPreview').style.display = 'none';
                    }
                };
                reader.readAsDataURL(file);
            }
        }
        
        function removeImage() {
            const input = document.getElementById('productImage');
            const preview = document.getElementById('imagePreview');
            const urlInput = document.getElementById('productImageUrl');
            const urlPreview = document.getElementById('urlPreview');
            if (input) input.value = '';
            if (preview) preview.style.display = 'none';
            if (urlInput) urlInput.value = '';
            if (urlPreview) urlPreview.style.display = 'none';
            selectedImageUrl = null;
        }
        
        // ============ CHANGER L'IMAGE D'UN PRODUIT ============
        function changeImage(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            // Créer un modal pour choisir entre fichier ou URL
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal-content">
                    <h2>📷 Changer la photo</h2>
                    <p style="color: #666; margin-bottom: 15px;">Choisissez une nouvelle photo pour "${product.name}"</p>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-weight: 600; margin-bottom: 5px;">Option 1: Uploader un fichier</label>
                        <input type="file" id="changeImageFile" accept="image/*" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-weight: 600; margin-bottom: 5px;">Option 2: URL GitHub</label>
                        <div class="url-input-group">
                            <input type="text" id="changeImageUrl" placeholder="https://raw.githubusercontent.com/.../images/mon-image.jpg">
                            <button type="button" onclick="testChangeImageUrl()">🔍 Tester</button>
                        </div>
                        <div id="changeUrlPreview" style="display: none; margin-top: 5px; padding: 5px 10px; border-radius: 5px;"></div>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn-save" onclick="saveNewImage('${product.id}')">✅ Appliquer</button>
                        <button type="button" class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">❌ Annuler</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            
            // Exposer la fonction de test pour le modal
            window.testChangeImageUrl = function() {
                const url = document.getElementById('changeImageUrl').value.trim();
                const preview = document.getElementById('changeUrlPreview');
                if (!url) {
                    preview.style.display = 'block';
                    preview.style.background = '#fff3cd';
                    preview.style.color = '#856404';
                    preview.innerHTML = '⚠️ Veuillez entrer une URL';
                    return;
                }
                
                const img = new Image();
                img.onload = function() {
                    preview.style.display = 'block';
                    preview.style.background = '#d4edda';
                    preview.style.color = '#155724';
                    preview.innerHTML = '✅ Image valide !';
                };
                img.onerror = function() {
                    preview.style.display = 'block';
                    preview.style.background = '#f8d7da';
                    preview.style.color = '#721c24';
                    preview.innerHTML = '❌ Image non trouvée';
                };
                img.src = url;
            };
            
            // Exposer la fonction de sauvegarde
            window.saveNewImage = function(productId) {
                const fileInput = document.getElementById('changeImageFile');
                const urlInput = document.getElementById('changeImageUrl');
                const urlPreview = document.getElementById('changeUrlPreview');
                
                let imageUrl = null;
                
                // Vérifier si un fichier a été sélectionné
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    if (file.size > 5 * 1024 * 1024) {
                        showToast('❌ L\'image est trop volumineuse (max 5MB)', 'error');
                        return;
                    }
                    
                    // Lire le fichier et le convertir en base64
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        imageUrl = e.target.result;
                        updateProductImage(productId, imageUrl);
                        overlay.remove();
                    };
                    reader.readAsDataURL(file);
                    return;
                }
                
                // Vérifier si une URL a été entrée
                if (urlInput.value.trim()) {
                    const url = urlInput.value.trim();
                    // Vérifier que l'image est valide
                    const img = new Image();
                    img.onload = function() {
                        updateProductImage(productId, url);
                        overlay.remove();
                    };
                    img.onerror = function() {
                        showToast('❌ URL invalide ou image non accessible', 'error');
                    };
                    img.src = url;
                    return;
                }
                
                showToast('⚠️ Veuillez sélectionner un fichier ou entrer une URL', 'warning');
            };
        }
        
        // ============ METTRE À JOUR L'IMAGE D'UN PRODUIT ============
        function updateProductImage(productId, imageUrl) {
            productsRef.child(productId).update({
                image: imageUrl,
                updatedAt: Date.now()
            })
            .then(() => {
                showToast('✅ Photo mise à jour avec succès !', 'success');
            })
            .catch(error => {
                showToast('❌ Erreur: ' + error.message, 'error');
            });
        }
        
        // ============ AJOUTER UN PRODUIT ============
        function addProduct(productData) {
            if (!validateProduct(productData)) {
                return Promise.reject(new Error('Validation échouée'));
            }
            
            // Déterminer l'URL de l'image
            let imageUrl = null;
            
            // Vérifier si une image a été uploadée
            const fileInput = document.getElementById('productImage');
            if (fileInput && fileInput.files.length > 0) {
                // Pour les fichiers uploadés, on les convertit en base64
                // Note: pour une solution professionnelle, il est recommandé d'utiliser un service d'hébergement
                const file = fileInput.files[0];
                if (file.size > 5 * 1024 * 1024) {
                    showToast('❌ L\'image est trop volumineuse (max 5MB)', 'error');
                    return Promise.reject(new Error('Image trop volumineuse'));
                }
                // On utilisera l'URL GitHub à la place
                showToast('⚠️ Veuillez utiliser une URL GitHub pour les images', 'warning');
                return Promise.reject(new Error('Utilisez une URL GitHub'));
            }
            
            // Vérifier si une URL a été entrée
            const urlInput = document.getElementById('productImageUrl');
            if (urlInput && urlInput.value.trim()) {
                imageUrl = urlInput.value.trim();
            }
            
            const newProduct = {
                name: productData.name.trim(),
                price: parseFloat(productData.price),
                category: productData.category,
                description: productData.description ? productData.description.trim() : '',
                visible: true,
                image: imageUrl,
                createdAt: Date.now()
            };
            
            return productsRef.push().set(newProduct)
                .then((ref) => {
                    console.log('✅ Produit ajouté à Firebase avec ID:', ref.key);
                    showToast('✅ Produit ajouté avec succès !', 'success');
                    return true;
                })
                .catch((error) => {
                    console.error('❌ Erreur Firebase:', error);
                    showToast('❌ Erreur: ' + error.message, 'error');
                    throw error;
                });
        }
        
        // ============ MODIFIER UN PRODUIT ============
        function editProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
